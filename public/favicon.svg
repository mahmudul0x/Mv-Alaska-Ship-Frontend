<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Anchor icon in navy blue for MV Alaska Cruise -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>
  <!-- Anchor ring at top -->
  <circle cx="32" cy="14" r="5" stroke="#d4af37" stroke-width="3" fill="none"/>
  <!-- Anchor vertical shaft -->
  <line x1="32" y1="19" x2="32" y2="50" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <!-- Anchor crossbar -->
  <line x1="18" y1="26" x2="46" y2="26" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <!-- Anchor left arm -->
  <path d="M32 50 Q20 50 18 44" stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Anchor right arm -->
  <path d="M32 50 Q44 50 46 44" stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Anchor left fluke -->
  <line x1="18" y1="44" x2="14" y2="40" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <!-- Anchor right fluke -->
  <line x1="46" y1="44" x2="50" y2="40" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
</svg>
